services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      STORAGE_DIR: /app/storage
    volumes:
      - knowledge_data:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "8082:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  knowledge_data:
